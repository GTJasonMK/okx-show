<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https: wss:; img-src 'self' data:; style-src 'self'; script-src 'self'; base-uri 'none'; form-action 'none'"
    >
    <title>OKX 账户看板</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./okx-runtime.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">OKX Private WebSocket</p>
          <h1>账户看板</h1>
        </div>
        <div class="topbar-actions">
          <nav class="page-tabs" aria-label="页面切换">
            <a class="page-tab" href="./index.html" aria-current="page">账户看板</a>
            <a class="page-tab" href="./positions-history.html">持仓历史</a>
          </nav>
          <button
            class="theme-toggle"
            id="theme-toggle"
            type="button"
            aria-label="切换到夜间主题"
            aria-pressed="false"
          >
            <span class="theme-toggle__icon" id="theme-icon" aria-hidden="true">☾</span>
            <span id="theme-label">夜间</span>
          </button>
          <div class="connection-pill" data-status="idle" id="connection-pill">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="status-label">未连接</span>
          </div>
        </div>
      </header>

      <section class="chart-panel" aria-labelledby="profit-chart-title">
        <div class="chart-heading">
          <div>
            <h2 id="profit-chart-title">收益曲线</h2>
            <p id="chart-summary">等待账户数据</p>
          </div>
          <div class="chart-legend" aria-label="曲线图例">
            <span class="chart-legend-item" data-series="stable">
              <i aria-hidden="true"></i>
              <span id="stable-legend-label">USDT 现金变化</span>
            </span>
            <span class="chart-legend-item" data-series="equity">
              <i aria-hidden="true"></i>
              <span id="equity-legend-label">权益折合 USDT 变化</span>
            </span>
          </div>
        </div>
        <div class="chart-stage">
          <canvas id="profit-chart" aria-label="实时收益曲线" role="img"></canvas>
          <div class="chart-empty" id="chart-empty">等待第一条 USDT 资产推送</div>
        </div>
        <div class="chart-stats" aria-label="收益曲线统计">
          <div>
            <span id="stable-current-label">USDT 当前</span>
            <strong id="stable-current">--</strong>
          </div>
          <div>
            <span>权益当前</span>
            <strong id="equity-current">--</strong>
          </div>
          <div>
            <span>权益最高</span>
            <strong id="equity-high">--</strong>
          </div>
          <div>
            <span>权益最低</span>
            <strong id="equity-low">--</strong>
          </div>
        </div>
      </section>

      <section class="data-layout">
        <article class="data-panel balance-panel">
          <div class="table-heading">
            <div>
              <h2>资产</h2>
              <p id="balance-count">0 个币种</p>
            </div>
            <label class="switch-field">
              <input id="hide-zero-input" type="checkbox" checked>
              <span>隐藏零余额</span>
            </label>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>币种</th>
                  <th>权益</th>
                  <th>可用</th>
                  <th>现金余额</th>
                  <th>折合 USD</th>
                </tr>
              </thead>
              <tbody id="balances-body">
                <tr>
                  <td colspan="5" class="empty-cell">等待账户数据</td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>

        <article class="data-panel positions-panel">
          <div class="table-heading">
            <div>
              <h2>持仓</h2>
              <p id="position-count">0 个持仓</p>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>合约</th>
                  <th>方向</th>
                  <th>数量</th>
                  <th>均价</th>
                  <th>标记价</th>
                  <th>未实现盈亏</th>
                  <th>杠杆</th>
                </tr>
              </thead>
              <tbody id="positions-body">
                <tr>
                  <td colspan="7" class="empty-cell">等待持仓数据</td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>
      </section>

    </main>
  </body>
</html>
